# Use <C-g> as a prefix.
unbind-key C-b
set-option -g prefix C-g
bind-key C-g send-prefix

# Enable truecolor.
set-option -g default-terminal tmux-256color
set-option -ga terminal-overrides 'xterm-256color:Tc'

# Start window index from 1.
set-option -g base-index 1

# Customize status line.
set-option -g status-style 'bg=default,fg=default'
set-option -g status-interval 1
set-option -g status-left '[#{?#{e|>:#{w:session_name},8},#{=7:session_name}…,#{session_name}}] '
set-option -g status-left-length 11
set-option -g status-right '#{?SSH_CONNECTION,SSH | ,}%Y-%m-%d %H:%M'
set-option -g status-right-length 22
set-option -g window-status-separator ' | '
set-option -g window-status-format '#I #W'
set-option -g window-status-current-format '#{T:window-status-format}'
set-option -g window-status-current-style 'bold'
set-option -g automatic-rename on
set-option -g automatic-rename-format '#[fg=yellow]#{?#{==:#{pane_current_path},#{HOME}},~,#{b:pane_current_path}}#[default] #[fg=green]#{pane_current_command}#[default]'

# Escape without delay.
set-option -s escape-time 0

# Use vi-like keybindings for copy mode.
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# Use vi-like keybindings to select pane.
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Popup window.
bind-key P run-shell "
case '#{session_name}' in
popup-*)
  tmux detach-client ;;
*)
  tmux display-popup -E -d '#{pane_current_path}' -x C -y C -w 90% -h 90% \
    tmux new-session -A -s 'popup-#{session_name}-#{window_index}'
esac
"
set-hook -g session-closed {
  run-shell "
case '#{hook_session_name}' in
popup-*) ;;
*)
  tmux list-sessions -F '##{session_name}' |
    grep '^popup-#{hook_session_name}-[0-9]*$' |
    xargs -rn1 tmux kill-session -t
esac
"
}

# Enable history.
set-option -g history-limit 10000

# Enable mouse.
set-option -g mouse on

# Use OSC 52 for clipboard.
set-option -s set-clipboard on
set-option -ga terminal-overrides 'tmux*:clipboard'
